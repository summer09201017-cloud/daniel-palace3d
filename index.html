<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b101e" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%AF%EF%B8%8F%3C/text%3E%3C/svg%3E" />
    <title>3D 王宮之夜 Daniel Palace 3D</title>
  </head>
  <body>
    <main class="app-shell">
      <canvas id="gameCanvas" aria-label="3D 王宮之夜遊戲畫面"></canvas>

      <!-- 路段/被發現看板 -->
      <div class="score-sheet" id="scoreSheet" hidden></div>

      <div class="power-panel" id="powerPanel" hidden>
        <span id="powerLabel">禱告</span>
        <div class="power-track"><div class="power-fill" id="powerFill"></div></div>
      </div>

      <div class="message-ribbon" id="statusMessage">選擇路線後開始。</div>
      <div class="commentary-bar" id="commentaryBar" hidden></div>
      <div class="goal-flash" id="strikeFlash" hidden>就位!</div>

      <div class="touch-controls" id="touchControls">
        <button id="touchLeft" class="touch-action alt" hidden>← 左移 (A)</button>
        <button id="touchRight" class="touch-action alt" hidden>右移 (D) →</button>
        <button id="touchRoll" class="touch-action" hidden>🙏 禱告</button>
      </div>

      <div class="hud-buttons">
        <button id="menuButton">選單</button>
        <button id="audioButton">音效開啟</button>
        <button id="cameraButton">視角</button>
      </div>

      <div class="overlay-shell" id="matchOverlay">
        <div class="overlay-card">
          <p class="overlay-eyebrow">殺令之夜</p>
          <h2 id="overlayTitle">—</h2>
          <p id="overlayText">—</p>
          <div class="overlay-actions">
            <button id="overlayMenuButton">回選單</button>
            <button id="overlayReplayButton">再潛行一次</button>
          </div>
        </div>
      </div>

      <div class="home-screen visible" id="homeScreen">
        <div class="home-card">
          <p class="home-eyebrow">DANIEL 2・但以理書二章</p>
          <h1>3D 王宮之夜 🕯️👑</h1>
          <p class="home-sub">王的殺令已出,哲士將要見殺——但以理趁夜潛行王宮,與三同伴同心祈求,那位顯明奧祕的神必施憐憫。</p>

          <div class="mode-grid" id="modeCardGrid">
            <button class="mode-card selected" data-mode="solo">
              <strong>🌙 殺令之夜</strong><span>柱影潛行避開獵手火把的光錐→到同伴處→同心祈求/奧祕指明/稱頌真神三連禱告!</span>
            </button>
          </div>

          <div class="home-row">
            <label for="framesSelect">路線</label>
            <select id="framesSelect">
              <option value="1">1 段(快速)</option>
              <option value="2" selected>2 段(標準)</option>
              <option value="3">3 段(挑戰)</option>
            </select>
            <label for="difficultySelect">難度</label>
            <select id="difficultySelect">
              <option value="kids">幼兒(1 名獵手)</option>
              <option value="child">兒童(2 名)</option>
              <option value="easy" selected>入門(3 名)</option>
              <option value="normal">標準(4 名)</option>
              <option value="hard">職業(5 名+快巡邏)</option>
            </select>
            <label for="audioSelect">音效</label>
            <select id="audioSelect">
              <option value="on" selected>開啟</option>
              <option value="off">靜音</option>
            </select>
          </div>

          <p class="home-hint">①<b>WASD/方向鍵(或拖曳畫面)</b>帶三位同伴潛行,<b>避開獵手的黃色火把光錐</b>,摸到<b>紅圈</b>(被照到=退回藏身帷幔,不會受傷,天色會隨路段漸亮) ②到位後看中下方大條——<b>指針掃進綠區時照順序按:J 同心祈求→K 奧祕指明→L 稱頌真神</b>(或點大按鈕) ③三連禱告齊了=奧祕在夜間異象中顯明,天亮哲士都得救!智慧能力都屬乎神。V 鍵換視角。</p>
          <button class="start-button" id="startMatchButton">開始潛行</button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
    <script>
      // play-stats 三層匿名計數(lobby-play-rank §3/§4):開啟 10 分去重;-start/-done 不去重;-done 帶 t=秒。零個資。
      window.psPing = function (key, t) {
        try {
          if (!location.hostname.endsWith('netlify.app')) return;
          var u = 'https://hfpc-play-stats.summer09201017.workers.dev/api/ping?g=' + key + (t ? '&t=' + t : '');
          if (navigator.sendBeacon) navigator.sendBeacon(u); else fetch(u, { mode: 'no-cors' });
        } catch (_) {}
      };
      try {
        var psK = 'ps-last-daniel-palace3d';
        var psLast = parseInt(localStorage.getItem(psK) || '0', 10);
        if (Date.now() - psLast > 600000) { localStorage.setItem(psK, String(Date.now())); window.psPing('daniel-palace3d'); }
      } catch (_) { window.psPing('daniel-palace3d'); }
    </script>
  </body>
</html>
